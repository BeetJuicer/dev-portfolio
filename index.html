<script>
async function loadSection(id, file) {
  const res = await fetch(file);
  const html = await res.text();
  const slot = document.getElementById(id);
  slot.innerHTML = html;

  // Re-execute any script tags (innerHTML doesn't run them)
  slot.querySelectorAll('script').forEach(oldScript => {
    const newScript = document.createElement('script');
    newScript.textContent = oldScript.textContent;
    document.body.appendChild(newScript);
    newScript.remove();
  });
}

  Promise.all([
    loadSection('slot-header',       'sections/header.html'),
    loadSection('slot-published',    'sections/published.html'),
    loadSection('slot-showcase',     'sections/showcase.html'),
    loadSection('slot-experience',   'sections/experience.html'),
    loadSection('slot-contact',      'sections/contact.html'),
  ]).then(() => {
    lucide.createIcons();
    hljs.highlightAll();
    initShowcaseCards(showcaseData);
    initShowcase();
    initReveal();
  });
</script>
